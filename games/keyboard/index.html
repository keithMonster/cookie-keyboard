<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Keyboard Smash · Cookie's Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #0a0e27;
    user-select: none;
    -webkit-user-select: none;
    transition: background-color 80ms ease-out;
    font-family: -apple-system, "PingFang SC", sans-serif;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* 触屏设备：返回按钮始终半可见（无 hover） */
  @media (hover: none) {
    #back { color: rgba(255, 255, 255, 0.4) !important; }
  }
  /* 返回入口 hot zone */
  #back {
    position: fixed;
    top: 0;
    right: 0;
    width: 70px;
    height: 70px;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.08);
    text-decoration: none;
    transition: color 250ms, background 250ms;
  }
  #back:hover {
    color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.06);
  }
  body.beat {
    background: #18204a;
  }
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* 外层 wrap：长程行为（drift / spin / fall） */
  .shape-wrap {
    position: absolute;
    pointer-events: none;
    will-change: transform;
  }
  .shape-wrap.drift {
    animation: drift 8s ease-in-out infinite;
  }
  .shape-wrap.spin {
    animation: spin 5s linear infinite;
  }
  .shape-wrap.fall {
    animation: fall 5s cubic-bezier(0.4, 0, 0.6, 1) forwards;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    25%      { transform: translate(40px, -25px); }
    50%      { transform: translate(-30px, 35px); }
    75%      { transform: translate(25px, 20px); }
  }
  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes fall {
    0%   { transform: translate(0, 0)             rotate(0deg); }
    100% { transform: translate(0, var(--fall-dist, 600px)) rotate(120deg); }
  }

  /* 内层 shape：pop-in + pulse */
  .shape {
    position: relative;
    width: 100%;
    height: 100%;
    transform-origin: center center;
    animation: pop-in 200ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
               pulse 2.5s ease-in-out 200ms infinite;
  }
  .shape-wrap.leaving .shape {
    animation: pop-out 600ms ease-in forwards;
  }

  @keyframes pop-in {
    0%   { transform: scale(0)    rotate(0deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(8deg); opacity: 1; }
    100% { transform: scale(1)    rotate(0deg); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }
  @keyframes pop-out {
    0%   { transform: scale(1);   opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* 粒子 */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    animation: particle-fly 1.1s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
  }
  @keyframes particle-fly {
    0%   { transform: translate(0, 0)              scale(1);   opacity: 1; }
    70%  {                                                     opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  /* 启动提示——首次按键即消失 */
  #hint {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.35);
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 24px;
    letter-spacing: 0.1em;
    pointer-events: none;
    transition: opacity 600ms;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<div id="stage"></div>
<a id="back" href="../../">←</a>
<div id="hint">按 任意键 开始 · F 全屏 · Space 烟花 · Esc 返回</div>

<script>
  // ========= 配置 =========
  const COLORS = [
    { hex: '#ff5252' }, { hex: '#ffb74d' }, { hex: '#ffeb3b' },
    { hex: '#66bb6a' }, { hex: '#4dd0e1' }, { hex: '#5c9eff' },
    { hex: '#ba68c8' }, { hex: '#f48fb1' }, { hex: '#ffffff' },
  ];

  // SVG path data，viewBox 0 0 100 100
  const SHAPES = [
    { path: 'M50,5 A45,45 0 1,1 49.99,5 Z' },                                              // 圆形
    { path: 'M10,10 H90 V90 H10 Z' },                                                       // 方形
    { path: 'M50,8 L92,88 L8,88 Z' },                                                       // 三角
    { path: 'M50,5 L61,38 L96,38 L68,59 L78,92 L50,72 L22,92 L32,59 L4,38 L39,38 Z' },     // 星星
    { path: 'M50,85 C20,65 5,45 5,28 C5,15 15,5 28,5 C38,5 45,12 50,22 C55,12 62,5 72,5 C85,5 95,15 95,28 C95,45 80,65 50,85 Z' }, // 爱心
    { path: 'M50,5 L88,28 L88,72 L50,95 L12,72 L12,28 Z' },                                 // 六边形
    { path: 'M50,5 L92,50 L50,95 L8,50 Z' },                                                // 菱形
    { path: 'M65,15 A40,40 0 1,0 65,85 A30,30 0 1,1 65,15 Z' },                             // 月亮
  ];

  // C 大调 8 音（C4 - C5）
  const SCALE_HZ = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];

  // 形状行为
  const BEHAVIORS = ['drift', 'spin', 'fall'];

  const MAX_SHAPES = 8;
  const SHAPE_LIFETIME_MS = 4500;
  const STAGE_PADDING = 80;
  const RARE_PROB = 0.01;       // 稀有大形状概率
  const PARTICLES_PER_SHAPE = 8;
  const FIREWORK_PARTICLES = 36;

  // ========= 状态 =========
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const liveShapes = [];
  let audioCtx = null;
  let firstKey = true;

  // ========= 工具 =========
  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    return Math.abs(h);
  }

  // ========= 音 =========
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playNote(freq, gainPeak = 0.3) {
    ensureAudio();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(gainPeak, now + 0.02);
    gain.gain.linearRampToValueAtTime(gainPeak * 0.6, now + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.9);
  }

  // C-E-G 和弦——空格烟花专属
  function playChord() {
    playNote(SCALE_HZ[0], 0.22);
    setTimeout(() => playNote(SCALE_HZ[2], 0.22), 60);
    setTimeout(() => playNote(SCALE_HZ[4], 0.22), 120);
  }

  // ========= 全屏 =========
  function tryFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement && el.requestFullscreen) {
      el.requestFullscreen().catch(() => {});
    }
  }

  // ========= 背景律动 =========
  function flashBackground() {
    document.body.classList.add('beat');
    setTimeout(() => document.body.classList.remove('beat'), 90);
  }

  // ========= 粒子 =========
  function spawnParticles(cx, cy, color, count, distRange = [100, 220]) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = rand(8, 14);
      p.style.left = (cx - size / 2) + 'px';
      p.style.top  = (cy - size / 2) + 'px';
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.background = color;
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
      const dist  = rand(distRange[0], distRange[1]);
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      stage.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }

  // ========= 满屏烟花（空格键专属） =========
  function spawnFirework() {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    for (let i = 0; i < FIREWORK_PARTICLES; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = rand(12, 20);
      p.style.left = (cx - size / 2) + 'px';
      p.style.top  = (cy - size / 2) + 'px';
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.background = pick(COLORS).hex;
      const angle = (i / FIREWORK_PARTICLES) * Math.PI * 2 + Math.random() * 0.15;
      const dist  = rand(220, 520);
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      stage.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
    playChord();
    flashBackground();
  }

  // ========= 形状 spawn =========
  function spawnShape(key, atX, atY) {
    const color = pick(COLORS);
    const shape = pick(SHAPES);
    const isRare = Math.random() < RARE_PROB;

    let sizeVw = rand(18, 28);
    if (isRare) sizeVw *= 1.6;
    const sizePx = window.innerWidth * sizeVw / 100;

    // 如果传入位置（点击/触摸），以位置为形状中心；否则随机
    let x, y;
    if (typeof atX === 'number' && typeof atY === 'number') {
      x = Math.max(STAGE_PADDING, Math.min(atX - sizePx / 2, window.innerWidth  - sizePx - STAGE_PADDING));
      y = Math.max(STAGE_PADDING, Math.min(atY - sizePx / 2, window.innerHeight - sizePx - STAGE_PADDING));
    } else {
      x = rand(STAGE_PADDING, Math.max(STAGE_PADDING + 1, window.innerWidth  - sizePx - STAGE_PADDING));
      y = rand(STAGE_PADDING, Math.max(STAGE_PADDING + 1, window.innerHeight - sizePx - STAGE_PADDING));
    }

    // 随机一种长程行为
    const behavior = pick(BEHAVIORS);

    const wrap = document.createElement('div');
    wrap.className = 'shape-wrap ' + behavior;
    wrap.style.left = x + 'px';
    wrap.style.top  = y + 'px';
    wrap.style.width  = sizePx + 'px';
    wrap.style.height = sizePx + 'px';
    // fall 行为：落地距离
    wrap.style.setProperty('--fall-dist', (window.innerHeight - y - sizePx + 60) + 'px');

    const inner = document.createElement('div');
    inner.className = 'shape';
    inner.innerHTML = `
      <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <path d="${shape.path}" fill="${color.hex}"
              stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
      </svg>
    `;
    wrap.appendChild(inner);

    stage.appendChild(wrap);
    liveShapes.push(wrap);

    setTimeout(() => removeShape(wrap), SHAPE_LIFETIME_MS);
    while (liveShapes.length > MAX_SHAPES) {
      removeShape(liveShapes[0]);
    }

    // 粒子尾迹（中心向外辐射）
    spawnParticles(x + sizePx / 2, y + sizePx / 2, color.hex, PARTICLES_PER_SHAPE);

    // 背景律动
    flashBackground();

    // 音
    const idx = hash(key) % SCALE_HZ.length;
    playNote(SCALE_HZ[idx]);
  }

  function removeShape(el) {
    const i = liveShapes.indexOf(el);
    if (i === -1) return;
    liveShapes.splice(i, 1);
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 600);
  }

  // ========= 输入处理 =========
  function handleFirstKey() {
    if (!firstKey) return;
    firstKey = false;
    hint.classList.add('gone');
    setTimeout(() => hint.remove(), 800);
    tryFullscreen();
  }

  document.addEventListener('keydown', (e) => {
    // Cmd / Ctrl 组合键放过去（让 Keith 还能 Cmd+Q）
    if (e.metaKey || e.ctrlKey) return;

    // ESC 返回入口（即使在全屏，先退全屏，再按一次回入口）
    if (e.key === 'Escape') {
      if (!document.fullscreenElement) {
        location.href = '../../';
      }
      return;
    }

    e.preventDefault();
    handleFirstKey();

    // F 单独触发全屏
    if (e.key === 'f' || e.key === 'F') {
      tryFullscreen();
      return;
    }

    // 空格键专属：满屏烟花
    if (e.code === 'Space') {
      spawnFirework();
      return;
    }

    spawnShape(e.key || e.code);
  });

  // 鼠标点击 / iPad 戳屏：在点击位置生成形状
  document.addEventListener('click', (e) => {
    handleFirstKey();
    spawnShape('click_' + Date.now(), e.clientX, e.clientY);
  });
  // iPad 触摸：每个手指都触发一次（多指齐戳很爽）
  document.addEventListener('touchstart', (e) => {
    if (e.target.closest('#back')) return;
    handleFirstKey();
    for (const t of e.changedTouches) {
      spawnShape('touch_' + Date.now() + '_' + t.identifier, t.clientX, t.clientY);
    }
    e.preventDefault();
  }, { passive: false });

  // 窗口尺寸变化——清场免得形状错位
  window.addEventListener('resize', () => {
    [...liveShapes].forEach(removeShape);
  });
</script>
</body>
</html>
