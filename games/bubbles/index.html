<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop Bubbles · Cookie's Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #0c1530;
    user-select: none;
    -webkit-user-select: none;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* 泡泡 */
  .bubble {
    position: absolute;
    border-radius: 50%;
    pointer-events: none; /* hover 戳破靠 mousemove，不依赖 dom hover */
    will-change: transform, opacity;
    box-shadow:
      inset -8px -10px 20px rgba(0, 0, 0, 0.15),
      inset 8px 10px 16px rgba(255, 255, 255, 0.45),
      0 0 30px rgba(255, 255, 255, 0.05);
    animation: float-up var(--life, 9s) linear forwards,
               wobble var(--wobble-period, 3s) ease-in-out infinite;
  }
  /* 高光斑点——更像泡泡 */
  .bubble::before {
    content: '';
    position: absolute;
    top: 18%;
    left: 22%;
    width: 28%;
    height: 22%;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    filter: blur(2px);
  }
  .bubble.popping {
    animation: pop 350ms ease-out forwards !important;
  }

  @keyframes float-up {
    0%   { transform: translateY(0)               translateX(0); opacity: 0; }
    8%   {                                                        opacity: 1; }
    92%  {                                                        opacity: 1; }
    100% { transform: translateY(var(--rise, -110vh)) translateX(0); opacity: 0; }
  }
  @keyframes wobble {
    0%, 100% { margin-left: 0; }
    50%      { margin-left: var(--wobble-amp, 30px); }
  }
  @keyframes pop {
    0%   { transform: scale(1);   opacity: 1; }
    40%  { transform: scale(1.4); opacity: 0.6; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* 戳破粒子 */
  .splash {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    animation: splash-fly 700ms cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
  }
  @keyframes splash-fly {
    0%   { transform: translate(0, 0)              scale(1);   opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  /* 返回 */
  #back {
    position: fixed; top: 0; right: 0;
    width: 70px; height: 70px;
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.08);
    text-decoration: none;
    transition: color 250ms, background 250ms;
  }
  #back:hover {
    color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.06);
  }

  /* 启动提示 */
  #hint {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.35);
    font-size: 22px;
    letter-spacing: 0.1em;
    pointer-events: none;
    transition: opacity 600ms;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<div id="stage"></div>
<a id="back" href="../../">←</a>
<div id="hint">按 任意键 或 移动鼠标 戳破泡泡 · Esc 返回</div>

<script>
  const COLORS = [
    '#ff8a8a', '#ffc97c', '#fff48a',
    '#a5e8a3', '#8be0e8', '#9bc4ff',
    '#d2a4f5', '#ffafd1', '#ffffff',
  ];

  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const liveBubbles = []; // {el, cx, cy, r, born}
  const MAX_BUBBLES = 14;
  const SPAWN_INTERVAL_MS = 500;

  let audioCtx = null;
  let mouseX = -1000, mouseY = -1000;
  let started = false;

  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ===== 音 =====
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  // "啵"——短促 sine 配频率下滑
  function playPop() {
    ensureAudio();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(rand(680, 1100), now);
    osc.frequency.exponentialRampToValueAtTime(rand(120, 200), now + 0.18);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.25, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.25);
  }

  // ===== 生成泡泡 =====
  function spawnBubble() {
    if (liveBubbles.length >= MAX_BUBBLES) return;

    const size = rand(70, 160); // 直径
    const startX = rand(0, window.innerWidth - size);
    const startBottom = -size; // 从屏幕外下方升起
    const life = rand(8, 12);
    const wobbleAmp = rand(20, 50) * (Math.random() < 0.5 ? -1 : 1);
    const wobblePeriod = rand(2.5, 4);
    const rise = -(window.innerHeight + size + 100);
    const color = pick(COLORS);

    const el = document.createElement('div');
    el.className = 'bubble';
    el.style.left = startX + 'px';
    el.style.bottom = startBottom + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    // 半透明渐变填色
    el.style.background = `radial-gradient(circle at 30% 30%,
      ${color}55 0%,
      ${color}33 40%,
      ${color}1a 70%,
      ${color}0d 100%)`;
    el.style.setProperty('--life', life + 's');
    el.style.setProperty('--rise', rise + 'px');
    el.style.setProperty('--wobble-amp', wobbleAmp + 'px');
    el.style.setProperty('--wobble-period', wobblePeriod + 's');

    stage.appendChild(el);

    const record = {
      el, color, size,
      startX, startBottom,
      life, rise, wobbleAmp, wobblePeriod,
      bornAt: performance.now(),
    };
    liveBubbles.push(record);

    // 自然消亡（飞出顶部）
    setTimeout(() => {
      const i = liveBubbles.indexOf(record);
      if (i >= 0) liveBubbles.splice(i, 1);
      el.remove();
    }, life * 1000 + 100);
  }

  // ===== 计算泡泡当前中心 =====
  function bubbleCenter(b, now) {
    const t = (now - b.bornAt) / 1000; // s
    const progress = Math.min(t / b.life, 1);
    const yOffset = b.rise * progress;
    // wobble (sin)
    const phase = (t / b.wobblePeriod) * Math.PI * 2;
    const xOffset = (Math.sin(phase) * 0.5 + 0.5) * b.wobbleAmp;
    const cx = b.startX + b.size / 2 + xOffset;
    // 屏幕坐标 y：bubble 用 bottom 锚定，再加 translateY(yOffset，负值=向上)
    const cy = window.innerHeight - b.startBottom - b.size / 2 + yOffset;
    return { cx, cy, r: b.size / 2 };
  }

  // ===== 戳破检测（鼠标 hover） =====
  function popCheck() {
    if (mouseX < 0) return;
    const now = performance.now();
    for (let i = liveBubbles.length - 1; i >= 0; i--) {
      const b = liveBubbles[i];
      if (b.popping) continue;
      const { cx, cy, r } = bubbleCenter(b, now);
      const dx = mouseX - cx;
      const dy = mouseY - cy;
      if (dx * dx + dy * dy < r * r) {
        popBubble(b, cx, cy);
      }
    }
  }

  // ===== 键盘戳破：戳屏幕最高的那个（最显眼）+ 立即补一个 =====
  function popHighestAndSpawn() {
    const now = performance.now();
    let target = null;
    let highestY = Infinity;
    for (const b of liveBubbles) {
      if (b.popping) continue;
      const c = bubbleCenter(b, now);
      if (c.cy < highestY) {
        highestY = c.cy;
        target = { b, cx: c.cx, cy: c.cy };
      }
    }
    if (target) {
      popBubble(target.b, target.cx, target.cy);
    } else {
      // 屏幕空 → 在屏幕中上方立即生成一个并爆开
      const cx = rand(window.innerWidth * 0.2, window.innerWidth * 0.8);
      const cy = rand(window.innerHeight * 0.2, window.innerHeight * 0.5);
      const color = pick(COLORS);
      spawnSplash(cx, cy, color);
      playPop();
    }
    // 不管戳没戳到都补充一个新泡泡，保持画面活力
    spawnBubble();
  }

  function popBubble(b, cx, cy) {
    b.popping = true;
    b.el.classList.add('popping');
    setTimeout(() => {
      const i = liveBubbles.indexOf(b);
      if (i >= 0) liveBubbles.splice(i, 1);
      b.el.remove();
    }, 360);
    spawnSplash(cx, cy, b.color);
    playPop();
  }

  function spawnSplash(cx, cy, color) {
    const count = 10;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'splash';
      const size = rand(6, 12);
      p.style.left = (cx - size / 2) + 'px';
      p.style.top  = (cy - size / 2) + 'px';
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.background = color;
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
      const dist  = rand(60, 140);
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      stage.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  }

  // ===== 启动 =====
  function start() {
    if (started) return;
    started = true;
    hint.classList.add('gone');
    setTimeout(() => hint.remove(), 800);
    ensureAudio();
    // 持续 spawn
    setInterval(spawnBubble, SPAWN_INTERVAL_MS);
    // 检测 loop
    function tick() {
      popCheck();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    // 先放 3 个免得空场
    for (let i = 0; i < 3; i++) setTimeout(spawnBubble, i * 300);
  }

  // ===== 输入 =====
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!started) start();
  });
  document.addEventListener('click', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!started) start();
    popCheck();
  });
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
      if (!started) start();
    }
  }, { passive: true });
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
      if (!started) start();
      popCheck();
    }
  }, { passive: true });

  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey) return;
    if (e.key === 'Escape') {
      if (!document.fullscreenElement) location.href = '../../';
      return;
    }
    e.preventDefault();
    if (!started) start();
    if (e.key === 'f' || e.key === 'F') {
      const el = document.documentElement;
      if (!document.fullscreenElement && el.requestFullscreen) {
        el.requestFullscreen().catch(() => {});
      }
      return;
    }
    // 任意键戳破最高的泡泡（Cookie 拍键盘也能玩）
    popHighestAndSpawn();
  });

  // 窗口尺寸变化清场
  window.addEventListener('resize', () => {
    [...liveBubbles].forEach(b => {
      const i = liveBubbles.indexOf(b);
      if (i >= 0) liveBubbles.splice(i, 1);
      b.el.remove();
    });
  });
</script>
</body>
</html>
