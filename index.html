<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie's Keyboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #0a0e27;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  .shape {
    position: absolute;
    pointer-events: none;
    transform-origin: center center;
    will-change: transform, opacity;
    animation: pop-in 200ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
               pulse 2.5s ease-in-out 200ms infinite;
  }
  .shape.leaving {
    animation: pop-out 600ms ease-in forwards;
  }
  @keyframes pop-in {
    0%   { transform: scale(0)    rotate(0deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(8deg); opacity: 1; }
    100% { transform: scale(1)    rotate(0deg); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }
  @keyframes pop-out {
    0%   { transform: scale(1);   opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  /* 启动提示——首次按键即消失 */
  #hint {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.35);
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 24px;
    letter-spacing: 0.1em;
    pointer-events: none;
    transition: opacity 600ms;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="hint">按 任意键 开始 · F 全屏 · Cmd+Q 退出</div>

<script>
  // ========= 配置 =========
  const COLORS = [
    { hex: '#ff5252', name: '红色' },
    { hex: '#ffb74d', name: '橙色' },
    { hex: '#ffeb3b', name: '黄色' },
    { hex: '#66bb6a', name: '绿色' },
    { hex: '#4dd0e1', name: '青色' },
    { hex: '#5c9eff', name: '蓝色' },
    { hex: '#ba68c8', name: '紫色' },
    { hex: '#f48fb1', name: '粉色' },
    { hex: '#ffffff', name: '白色' },
  ];

  // SVG path data，viewBox 0 0 100 100
  const SHAPES = [
    { name: '圆形',   path: 'M50,5 A45,45 0 1,1 49.99,5 Z' },
    { name: '方形',   path: 'M10,10 H90 V90 H10 Z' },
    { name: '三角',   path: 'M50,8 L92,88 L8,88 Z' },
    { name: '星星',   path: 'M50,5 L61,38 L96,38 L68,59 L78,92 L50,72 L22,92 L32,59 L4,38 L39,38 Z' },
    { name: '爱心',   path: 'M50,85 C20,65 5,45 5,28 C5,15 15,5 28,5 C38,5 45,12 50,22 C55,12 62,5 72,5 C85,5 95,15 95,28 C95,45 80,65 50,85 Z' },
    { name: '六边形', path: 'M50,5 L88,28 L88,72 L50,95 L12,72 L12,28 Z' },
    { name: '菱形',   path: 'M50,5 L92,50 L50,95 L8,50 Z' },
    { name: '月亮',   path: 'M65,15 A40,40 0 1,0 65,85 A30,30 0 1,1 65,15 Z' },
  ];

  // C 大调 8 音（C4 - C5）
  const SCALE_HZ = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];

  const MAX_SHAPES = 8;
  const SHAPE_LIFETIME_MS = 4500;
  const STAGE_PADDING = 80;

  // ========= 状态 =========
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const liveShapes = [];
  let audioCtx = null;
  let firstKey = true;

  // ========= 工具 =========
  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    return Math.abs(h);
  }

  // ========= 音 =========
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playNote(freq) {
    ensureAudio();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    // ADSR 信封——温和钢琴味
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.9);
  }

  // ========= TTS =========
  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    // 节流——婴儿乱拍会堆队列
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.volume = 0.7;
    u.rate = 1.0;
    u.pitch = 1.1;
    speechSynthesis.speak(u);
  }

  // ========= 全屏 =========
  function tryFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement && el.requestFullscreen) {
      el.requestFullscreen().catch(() => {});
    }
  }

  // ========= 形状 spawn =========
  function spawnShape(key) {
    const color = pick(COLORS);
    const shape = pick(SHAPES);

    const sizeVw = rand(18, 28); // 视口宽度的 18-28%
    const sizePx = window.innerWidth * sizeVw / 100;

    const x = rand(STAGE_PADDING, window.innerWidth  - sizePx - STAGE_PADDING);
    const y = rand(STAGE_PADDING, window.innerHeight - sizePx - STAGE_PADDING);

    const wrap = document.createElement('div');
    wrap.className = 'shape';
    wrap.style.left = x + 'px';
    wrap.style.top  = y + 'px';
    wrap.style.width  = sizePx + 'px';
    wrap.style.height = sizePx + 'px';

    wrap.innerHTML = `
      <svg viewBox="0 0 100 100" width="100%" height="100%"
           xmlns="http://www.w3.org/2000/svg">
        <path d="${shape.path}" fill="${color.hex}"
              stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
      </svg>
    `;

    stage.appendChild(wrap);
    liveShapes.push(wrap);

    // 自然消亡
    setTimeout(() => removeShape(wrap), SHAPE_LIFETIME_MS);

    // 容量上限——溢出删最旧
    while (liveShapes.length > MAX_SHAPES) {
      removeShape(liveShapes[0]);
    }

    // 音 + 语
    const idx = hash(key) % SCALE_HZ.length;
    playNote(SCALE_HZ[idx]);
    speak(color.name);
  }

  function removeShape(el) {
    const i = liveShapes.indexOf(el);
    if (i === -1) return;
    liveShapes.splice(i, 1);
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 600);
  }

  // ========= 输入处理 =========
  document.addEventListener('keydown', (e) => {
    // Cmd / Ctrl 组合键放过去（让 Keith 还能 Cmd+Q）
    if (e.metaKey || e.ctrlKey) return;

    e.preventDefault();

    if (firstKey) {
      firstKey = false;
      hint.classList.add('gone');
      setTimeout(() => hint.remove(), 800);
      tryFullscreen();
    }

    // F 单独触发全屏
    if (e.key === 'f' || e.key === 'F') {
      tryFullscreen();
      return;
    }

    spawnShape(e.key || e.code);
  });

  // 鼠标点击也能玩（万一 Cookie 拍触摸板）
  document.addEventListener('click', (e) => {
    if (firstKey) {
      firstKey = false;
      hint.classList.add('gone');
      setTimeout(() => hint.remove(), 800);
      tryFullscreen();
    }
    spawnShape('click_' + Date.now());
  });

  // 窗口尺寸变化——清场免得形状错位
  window.addEventListener('resize', () => {
    [...liveShapes].forEach(removeShape);
  });
</script>
</body>
</html>
