<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie's Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    min-height: 100vh;
    background: #0a0e27;
    font-family: -apple-system, "PingFang SC", sans-serif;
    color: rgba(255, 255, 255, 0.9);
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }
  /* 顶部标题 */
  .title {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    letter-spacing: 0.4em;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    font-weight: 300;
    z-index: 10;
  }
  /* 主网格 */
  .grid {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 24px;
    padding: 80px 32px 32px;
  }
  .tile {
    position: relative;
    border-radius: 28px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 280ms cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 280ms ease-out;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    background: #11173a;
  }
  .tile:hover {
    transform: scale(1.02);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(255, 255, 255, 0.1);
  }
  .tile:active { transform: scale(0.98); }

  /* preview 区 */
  .preview {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* 卡片底部标签 */
  .label {
    padding: 16px 24px 20px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(8px);
  }
  .label .name {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .label .num {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.2em;
    font-variant-numeric: tabular-nums;
  }

  /* ====== 卡片 1: Keyboard preview ====== */
  .preview.keyboard {
    background: #0a0e27;
  }
  .preview.keyboard .kb-shape {
    position: absolute;
    width: 22%;
    aspect-ratio: 1;
    animation: kb-pop 2s ease-in-out infinite;
  }
  .preview.keyboard .kb-shape:nth-child(1) { left: 18%; top: 22%; animation-delay: 0s;   }
  .preview.keyboard .kb-shape:nth-child(2) { left: 58%; top: 18%; animation-delay: 0.5s; }
  .preview.keyboard .kb-shape:nth-child(3) { left: 22%; top: 56%; animation-delay: 1s;   }
  .preview.keyboard .kb-shape:nth-child(4) { left: 60%; top: 60%; animation-delay: 1.5s; }
  @keyframes kb-pop {
    0%, 90%, 100% { transform: scale(0); opacity: 0; }
    15%           { transform: scale(1.15); opacity: 1; }
    75%           { transform: scale(1);    opacity: 1; }
  }

  /* ====== 卡片 2: Bubbles preview ====== */
  .preview.bubbles {
    background: linear-gradient(180deg, #0c1530 0%, #0a1028 100%);
  }
  .preview.bubbles .bubble {
    position: absolute;
    border-radius: 50%;
    animation: pv-rise 5s linear infinite;
    box-shadow:
      inset -4px -5px 10px rgba(0, 0, 0, 0.15),
      inset 4px 5px 10px rgba(255, 255, 255, 0.5);
  }
  .preview.bubbles .bubble:nth-child(1) { left: 15%; width: 22%; aspect-ratio: 1; animation-delay: 0s;   background: radial-gradient(circle at 30% 30%, #8be0e855, #8be0e81a); }
  .preview.bubbles .bubble:nth-child(2) { left: 50%; width: 18%; aspect-ratio: 1; animation-delay: 1.2s; background: radial-gradient(circle at 30% 30%, #ffafd155, #ffafd11a); }
  .preview.bubbles .bubble:nth-child(3) { left: 75%; width: 26%; aspect-ratio: 1; animation-delay: 2.4s; background: radial-gradient(circle at 30% 30%, #fff48a55, #fff48a1a); }
  .preview.bubbles .bubble:nth-child(4) { left: 30%; width: 16%; aspect-ratio: 1; animation-delay: 3.6s; background: radial-gradient(circle at 30% 30%, #a5e8a355, #a5e8a31a); }
  @keyframes pv-rise {
    0%   { bottom: -30%; opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { bottom: 110%; opacity: 0; }
  }

  /* ====== 卡片 3: Drums preview ====== */
  .preview.drums {
    background: #0a0e27;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12%;
  }
  .preview.drums .pad {
    width: 16%;
    aspect-ratio: 1;
    border-radius: 50%;
    animation: pad-beat 1.6s ease-in-out infinite;
  }
  .preview.drums .pad:nth-child(1) { background: #ff5252; animation-delay: 0s;   }
  .preview.drums .pad:nth-child(2) { background: #ffeb3b; animation-delay: 0.4s; }
  .preview.drums .pad:nth-child(3) { background: #5c9eff; animation-delay: 0.8s; }
  .preview.drums .pad:nth-child(4) { background: #ba68c8; animation-delay: 1.2s; }
  @keyframes pad-beat {
    0%, 100% { transform: scale(0.7); opacity: 0.3; box-shadow: 0 0 0 0 currentColor; }
    20%      { transform: scale(1.2); opacity: 1;   box-shadow: 0 0 30px 8px currentColor; }
  }

  /* ====== 卡片 4: Cascade preview ====== */
  .preview.cascade {
    animation: cascade-cycle 10s linear infinite;
  }
  @keyframes cascade-cycle {
    0%   { background: #d65a5a; }
    14%  { background: #d68a52; }
    28%  { background: #d4be4d; }
    42%  { background: #5fa86c; }
    56%  { background: #4eaab4; }
    70%  { background: #5d83c4; }
    84%  { background: #9968b3; }
    100% { background: #d18ab2; }
  }

  /* 底部提示 */
  .footer {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(255, 255, 255, 0.25);
  }
</style>
</head>
<body>

<div class="title">COOKIE'S ARCADE</div>

<div class="grid">
  <!-- 1. Keyboard -->
  <a class="tile" href="games/keyboard/" data-num="1">
    <div class="preview keyboard">
      <svg class="kb-shape" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,5 A45,45 0 1,1 49.99,5 Z" fill="#ff5252"/>
      </svg>
      <svg class="kb-shape" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,5 L61,38 L96,38 L68,59 L78,92 L50,72 L22,92 L32,59 L4,38 L39,38 Z" fill="#ffeb3b"/>
      </svg>
      <svg class="kb-shape" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,8 L92,88 L8,88 Z" fill="#66bb6a"/>
      </svg>
      <svg class="kb-shape" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,85 C20,65 5,45 5,28 C5,15 15,5 28,5 C38,5 45,12 50,22 C55,12 62,5 72,5 C85,5 95,15 95,28 C95,45 80,65 50,85 Z" fill="#ba68c8"/>
      </svg>
    </div>
    <div class="label">
      <span class="name">键盘小子</span>
      <span class="num">01</span>
    </div>
  </a>

  <!-- 2. Bubbles -->
  <a class="tile" href="games/bubbles/" data-num="2">
    <div class="preview bubbles">
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
    </div>
    <div class="label">
      <span class="name">戳泡泡</span>
      <span class="num">02</span>
    </div>
  </a>

  <!-- 3. Drums -->
  <a class="tile" href="games/drums/" data-num="3">
    <div class="preview drums">
      <div class="pad"></div>
      <div class="pad"></div>
      <div class="pad"></div>
      <div class="pad"></div>
    </div>
    <div class="label">
      <span class="name">小鼓机</span>
      <span class="num">03</span>
    </div>
  </a>

  <!-- 4. Cascade -->
  <a class="tile" href="games/cascade/" data-num="4">
    <div class="preview cascade"></div>
    <div class="label">
      <span class="name">变色屏</span>
      <span class="num">04</span>
    </div>
  </a>
</div>

<div class="footer">按 1-4 选游戏 · 任意键随机进入</div>

<script>
  const tiles = document.querySelectorAll('.tile');
  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey) return;

    // 数字键 1-4：精确跳转
    const idx = parseInt(e.key, 10);
    if (idx >= 1 && idx <= tiles.length) {
      const tile = tiles[idx - 1];
      if (tile) {
        e.preventDefault();
        location.href = tile.getAttribute('href');
        return;
      }
    }

    // 任意可打印字符 / Enter / Space：随机进入一款
    // Cookie 还不会用鼠标，拍键就能玩
    if (e.key.length === 1 || e.key === 'Enter') {
      e.preventDefault();
      const random = tiles[Math.floor(Math.random() * tiles.length)];
      location.href = random.getAttribute('href');
    }
  });
</script>

</body>
</html>
